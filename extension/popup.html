<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 12px 14px;
      min-width: 220px;
      color: #111;
    }
    h1 {
      font-size: 14px;
      margin: 0 0 8px;
    }
    p {
      font-size: 12px;
      margin: 0 0 6px;
      line-height: 1.4;
      color: #444;
    }
    .ok { color: #15803d; font-weight: 600; }
    code {
      font-size: 11px;
      background: #f3f4f6;
      padding: 1px 4px;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <h1>Wadjet</h1>
  <p class="ok">Extension is loaded.</p>
  <p>Open a LinkedIn job page (<code>/jobs/...</code>) to see the Wadjet eye icon next to the job title.</p>
</body>
</html>
