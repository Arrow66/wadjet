# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: wadjet
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: MOCK_MODE
        value: "false"
